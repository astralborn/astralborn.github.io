<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>astralborn | 404 — Path Not Found</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Courier New', monospace;
            background: #121212;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: radial-gradient(#00FF8C 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.04;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 680px;
        }

        /* ── Error code ── */
        .error-code {
            font-size: clamp(5rem, 20vw, 9rem);
            font-weight: bold;
            background: linear-gradient(45deg, #00FF8C, #00D9FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 0.25rem;
            opacity: 0;
            animation: fadeUp 0.4s 0.2s ease-out forwards;
        }

        .error-label {
            color: #FF6B6B;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeUp 0.4s 0.35s ease-out forwards;
        }

        /* ── Terminal window ── */
        .terminal {
            background: rgba(26, 26, 26, 0.85);
            border: 1px solid rgba(0, 255, 140, 0.3);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 255, 140, 0.15);
            opacity: 0;
            animation: fadeUp 0.4s 0.5s ease-out forwards;
        }

        .terminal-header {
            background: rgba(0, 0, 0, 0.4);
            padding: 0.7rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 1px solid rgba(0, 255, 140, 0.2);
        }

        .dot {
            width: 12px; height: 12px;
            border-radius: 50%;
        }
        .dot-r { background: #FF3E3E; }
        .dot-y { background: #FFD700; }
        .dot-g { background: #00FF8C; }

        .terminal-body {
            padding: 1.5rem 1.75rem;
            line-height: 2;
            font-size: 0.92rem;
        }

        .line { opacity: 0; }
        .line:nth-child(1) { animation: fadeIn 0.2s 0.8s  forwards; }
        .line:nth-child(2) { animation: fadeIn 0.2s 1.1s  forwards; }
        .line:nth-child(3) { animation: fadeIn 0.2s 1.4s  forwards; }
        .line:nth-child(4) { animation: fadeIn 0.2s 1.7s  forwards; }
        .line:nth-child(5) { animation: fadeIn 0.2s 2.0s  forwards; }
        .line:nth-child(6) { animation: fadeIn 0.2s 2.3s  forwards; }
        .line:nth-child(7) { animation: fadeIn 0.2s 2.6s  forwards; }

        .p  { color: #00FF8C; }
        .cmd{ color: #FF6B6B; }
        .out{ color: #aaa; }
        .err{ color: #FF3E3E; }
        .ok { color: #00FF8C; }

        /* ── Home link ── */
        .home-link {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.75rem 1.75rem;
            border: 1px solid #00FF8C;
            border-radius: 5px;
            color: #00FF8C;
            text-decoration: none;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.25s;
            opacity: 0;
            animation: fadeUp 0.4s 3s ease-out forwards;
        }

        .home-link:hover {
            background: #00FF8C;
            color: #121212;
        }

        /* ── Cursor ── */
        .cursor {
            display: inline-block;
            width: 9px; height: 1.1em;
            background: #00FF8C;
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
        }

        /* ── Keyframes ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0; }
        }

        @media (max-width: 480px) {
            .terminal-body { padding: 1rem 1.1rem; font-size: 0.82rem; }
        }
    </style>
</head>
<body>
<div class="container">

    <div class="error-code">404</div>
    <div class="error-label"># exception: PathNotFoundException</div>

    <div class="terminal">
        <div class="terminal-header">
            <div class="dot dot-r"></div>
            <div class="dot dot-y"></div>
            <div class="dot dot-g"></div>
        </div>
        <div class="terminal-body">
            <div class="line"><span class="p">$</span> <span class="cmd">pytest</span> <span class="out">tests/navigation/ -v</span></div>
            <div class="line"><span class="out">collecting ...</span></div>
            <div class="line"><span class="err">FAILED</span> <span class="out">tests/navigation/test_routes.py::test_path_exists</span></div>
            <div class="line"><span class="err">E    AssertionError: path '<span id="badpath">/???</span>' returned HTTP 404</span></div>
            <div class="line"><span class="out">──────────────────────────────────────</span></div>
            <div class="line"><span class="err">1 failed</span><span class="out">, 0 passed in 0.00s</span></div>
            <div class="line"><span class="p">$</span> <span class="out">cd /home <span class="cursor"></span></span></div>
        </div>
    </div>

    <a href="/" class="home-link">&gt;&gt; return to base</a>

</div>

<script>
    // Show the actual bad path in the error line
    const bad = document.getElementById('badpath');
    if (bad) bad.textContent = window.location.pathname;
</script>
</body>
</html>
